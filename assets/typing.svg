<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 80" width="900" height="80">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#020c14;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#0d1f35;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#020c14;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="900" height="80" fill="url(#bgGrad)" rx="8"/>
  
  <!-- Animated typing text -->
  <text x="450" y="35" text-anchor="middle" fill="#00ffe7" font-family="'Courier New', monospace" font-size="18" font-weight="bold" filter="url(#glow)">
    <animate attributeName="opacity" values="0;1;1;1;0" dur="0.5s" begin="0s" fill="freeze"/>
    AI Engineer
  </text>

  <!-- Subtitle cycling with animation -->
  <text x="450" y="60" text-anchor="middle" fill="#5a8fa8" font-family="'Courier New', monospace" font-size="12">
    Machine Learning  •  LLM  •  RAG  •  Computer Vision  •  Power BI
  </text>

  <!-- Cursor blink -->
  <rect x="672" y="42" width="8" height="16" fill="#00ffe7" filter="url(#glow)">
    <animate attributeName="opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite"/>
  </rect>
</svg>
